server:
  port: 8084

spring:
  application:
    name: analytics-consumer

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: manual
    consumer:
      group-id: analytics-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.urlshortener.AnalyticsConsumer.dto"
        spring.json.value.default.type: "com.urlshortener.AnalyticsConsumer.dto.ClickEventMessage"
        spring.json.use.type.headers: false

clickhouse:
  url: ${CLICKHOUSE_URL:http://localhost:8123}
  database: ${CLICKHOUSE_DATABASE:analytics}
  username: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:clickhouse123}

analytics:
  batch-size: ${BATCH_SIZE:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.urlshortener: INFO