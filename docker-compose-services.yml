version: '3.9'

services:
  range-server:
    build: ./RangeServer
    container_name: range-server
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      TOTAL_SEQUENCES: 3500000000000
      RANGE_SIZE: 1000000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - urlshortener-net

  counter-server:
    build: ./CounterServer
    container_name: counter-server
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SERVER_ID: counter-server-1
      RANGE_SERVER_URL: http://range-server:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      RANGE_REFILL_THRESHOLD: 10000
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health | grep -q 'UP'" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      range-server:
        condition: service_healthy
    networks:
      - urlshortener-net

  url-shortener-service:
    build: ./UrlShortenerService
    container_name: url-shortener-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      POSTGRES_URL: jdbc:postgresql://postgres:5432/urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      COUNTER_SERVER_URLS: http://counter-server:8082
      BASE_URL: http://localhost
      URL_DEFAULT_TTL_DAYS: 365
      RATE_LIMIT_SHORTEN_RPM: 60
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8085/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      counter-server:
        condition: service_started
    networks:
      - urlshortener-net

  url-redirect-service:
    build: ./UrlRedirectService
    container_name: url-redirect-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RATE_LIMIT_REDIRECT_RPM: 300
    networks:
      - urlshortener-net

  analytics-consumer:
    build: ./AnalyticsConsumer
    container_name: analytics-consumer
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      BATCH_SIZE: 10
    networks:
      - urlshortener-net

  analytics-service:
    build: ./AnalyticsService
    container_name: analytics-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      POSTGRES_URL: jdbc:postgresql://postgres:5432/urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
    depends_on:
      url-shortener-service:
        condition: service_started
    networks:
      - urlshortener-net

  api-gateway:
    build: ./APIGateway
    container_name: api-gateway
    ports:
      - "80:80"
    environment:
      SERVER_PORT: 80
      URL_SHORTENER_SERVICE_URL: http://url-shortener-service:8085
      URL_REDIRECT_SERVICE_URL: http://url-redirect-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
    depends_on:
      - url-shortener-service
      - url-redirect-service
      - analytics-service
    networks:
      - urlshortener-net

  ui:
    build: ./ui
    container_name: ui
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - urlshortener-net

networks:
  urlshortener-net:
    external: true
    name: urlshortener-net